name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The brain is a sibling path reference (see src/Zits.Ui/Zits.Ui.csproj):
      # both repos must be checked out side by side.
      - uses: actions/checkout@v4
        with:
          path: zits-helm

      - uses: actions/checkout@v4
        with:
          repository: lzitser23/Navius
          path: navius
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Validate registry manifest
        # Schema-validates registry.json against registry.schema.json and runs the
        # structural checks a schema cannot express (file paths exist, registryDependencies
        # resolve, no duplicate names, no clashing targets). The brain repo is a sibling,
        # so ../navius/ sources resolve with --root pointed at the helm checkout.
        run: dotnet run --project zits-helm/tools/RegistryLint/RegistryLint.csproj -c Release -- --root zits-helm

      - name: Build helm (Zits.Ui)
        run: dotnet build zits-helm/src/Zits.Ui/Zits.Ui.csproj -c Debug

      - name: Build release packages
        run: |
          dotnet build zits-helm/src/Zits.Ui/Zits.Ui.csproj -c Release
          dotnet build zits-helm/tools/Navius.Cli/Navius.Cli.csproj -c Release

      - name: Run unit tests
        run: dotnet test zits-helm/tests/Zits.Ui.Tests/Zits.Ui.Tests.csproj -c Release

      - name: Pack NuGet artifacts
        run: |
          dotnet pack zits-helm/src/Zits.Ui/Zits.Ui.csproj -c Release --no-build -o "${{ runner.temp }}/nupkgs"
          dotnet pack zits-helm/tools/Navius.Cli/Navius.Cli.csproj -c Release --no-build -o "${{ runner.temp }}/nupkgs"

      - name: Smoke test installed CLI
        run: |
          # Install the version we just packed, never a published one from nuget.org.
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' zits-helm/tools/Navius.Cli/Navius.Cli.csproj)
          dotnet tool install --tool-path "${{ runner.temp }}/navius-tool" --add-source "${{ runner.temp }}/nupkgs" navius --version "$VERSION"
          "${{ runner.temp }}/navius-tool/navius" list
          mkdir -p "${{ runner.temp }}/navius-smoke"
          "${{ runner.temp }}/navius-tool/navius" add button --to "${{ runner.temp }}/navius-smoke" --namespace Smoke.Ui
          test -f "${{ runner.temp }}/navius-smoke/Zits/Button/ZitsButton.razor"
