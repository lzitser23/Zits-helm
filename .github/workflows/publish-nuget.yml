name: publish-nuget

# Publishes in two ways, sharing one workflow file so the nuget.org trusted
# publishing policy (which pins this filename) covers both:
#   - workflow_dispatch: publish one named package on demand.
#   - push to main touching a package csproj: publish every package whose
#     <Version> is not yet on nuget.org. The check is against the live
#     flat-container index, not the diff, so a bump that slipped through
#     unpublished is picked up by the next qualifying push, and re-runs are
#     harmless (`dotnet nuget push --skip-duplicate`).
# The push path reads the nuget.org account from the NUGET_USER repository
# variable; dispatch runs take it as an input.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - Zits.Ui
          - navius
      nuget_user:
        description: nuget.org username or organization with the trusted publishing policy
        required: true
        type: string
      navius_ref:
        description: Navius ref to checkout for the sibling project reference
        required: false
        default: main
        type: string
  push:
    branches:
      - main
    paths:
      - src/Zits.Ui/Zits.Ui.csproj
      - tools/Navius.Cli/Navius.Cli.csproj
      # The workflow itself: merging a change to it reconciles any pending,
      # not-yet-published version bumps.
      - .github/workflows/publish-nuget.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-nuget
  cancel-in-progress: false

jobs:
  detect:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect packages to publish
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'packages=["${{ inputs.package }}"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dependency order: the library before the CLI that vendors it.
          names=(Zits.Ui navius)
          paths=(src/Zits.Ui/Zits.Ui.csproj
                 tools/Navius.Cli/Navius.Cli.csproj)
          ids=(zits.ui navius)

          pending=()
          for i in "${!names[@]}"; do
            # tr strips the \r a CRLF checkout would leave on the captured group.
            version=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' "${paths[$i]}" | tr -d '\r')
            if [ -z "$version" ]; then
              echo "No <Version> found in ${paths[$i]}" >&2
              exit 1
            fi
            # A curl failure (404 for a never-published id, or a transient
            # error) falls through to "publish"; --skip-duplicate makes a
            # false positive a no-op.
            published=$(curl -sf "https://api.nuget.org/v3-flatcontainer/${ids[$i]}/index.json" || echo '{"versions":[]}')
            if echo "$published" | grep -q "\"$version\""; then
              echo "${names[$i]} $version is already on nuget.org"
            else
              echo "${names[$i]} $version is not on nuget.org: queueing publish"
              pending+=("\"${names[$i]}\"")
            fi
          done

          list=$(IFS=,; echo "${pending[*]}")
          echo "packages=[$list]" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    strategy:
      max-parallel: 1
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      # The brain is a sibling path reference (see src/Zits.Ui/Zits.Ui.csproj):
      # both repos must be checked out side by side.
      - uses: actions/checkout@v4
        with:
          path: zits-helm

      - uses: actions/checkout@v4
        with:
          repository: lzitser23/Navius
          path: navius
          ref: ${{ inputs.navius_ref || 'main' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select project
        id: select
        shell: bash
        run: |
          case "${{ matrix.package }}" in
            Zits.Ui)
              echo "project=zits-helm/src/Zits.Ui/Zits.Ui.csproj" >> "$GITHUB_OUTPUT"
              ;;
            navius)
              echo "project=zits-helm/tools/Navius.Cli/Navius.Cli.csproj" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown package: ${{ matrix.package }}" >&2
              exit 1
              ;;
          esac

      - name: Build package project
        run: dotnet build "${{ steps.select.outputs.project }}" -c Release

      - name: Run unit tests
        run: dotnet test zits-helm/tests/Zits.Ui.Tests/Zits.Ui.Tests.csproj -c Release

      - name: Pack package
        run: dotnet pack "${{ steps.select.outputs.project }}" -c Release --no-build -o "${{ runner.temp }}/nupkgs"

      - name: Smoke test navius tool package
        if: ${{ matrix.package == 'navius' }}
        run: |
          # Install the version we just packed, never a published one from nuget.org.
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' zits-helm/tools/Navius.Cli/Navius.Cli.csproj)
          dotnet tool install --tool-path "${{ runner.temp }}/navius-tool" --add-source "${{ runner.temp }}/nupkgs" navius --version "$VERSION"
          "${{ runner.temp }}/navius-tool/navius" list
          mkdir -p "${{ runner.temp }}/navius-smoke"
          # `dialog` pulls the `core` item, which copies the brain plus its wwwroot interop
          # JS - the path that exercises the bundled wwwroot pack layout. `set -e` (the
          # default for shell: bash) already fails the step on a non-zero exit code.
          "${{ runner.temp }}/navius-tool/navius" add dialog --to "${{ runner.temp }}/navius-smoke" --namespace Smoke.Ui
          test -f "${{ runner.temp }}/navius-smoke/Zits/Dialog/ZitsDialog.razor"
          test -f "${{ runner.temp }}/navius-smoke/wwwroot/navius-interop.js"

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ inputs.nuget_user || vars.NUGET_USER }}

      - name: Publish package
        working-directory: ${{ runner.temp }}/nupkgs
        run: dotnet nuget push "*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
